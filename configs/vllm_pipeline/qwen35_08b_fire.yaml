# ============================================================
# vLLM 벤치마크 평가 파이프라인 설정
#
# Qwen3.5-0.8B 베이스 모델의 Fire 벤치마크 테스트용.
# (테스트셋 평가 Precision/Recall/F1 과는 별개 프로세스)
#
# 사용법:
#   python -m src.vllm_pipeline -c configs/vllm_pipeline/qwen35_08b_fire.yaml
#
# 모델 교체 시 변경 필드:
#   docker.model, evaluate.model, evaluate.run_name, submit.model_name
# ============================================================

pipeline:
  name: "Qwen3.5-0.8B Fire Benchmark"
  steps:
    docker: true
    evaluate: true
    submit: true
  cleanup_docker: true
  docker_restart_interval: 1   # 벤치마크 N개마다 Docker 재시작 (0=비활성, 기본값 1)

retry:
  max_attempts: 3
  wait_seconds: 30

# ── Docker 설정 ──
docker:
  container_name: "qwen35_08b_mm_80g"
  image: "vllm/vllm-openai:cu130-nightly"
  gpus: "all"
  port: 8000
  ipc: "host"
  volumes:
    - "~/.cache/huggingface:/root/.cache/huggingface"
  model: "Qwen/Qwen3.5-0.8B"
  vllm_args:
    tensor-parallel-size: 1
    max-model-len: 8192
    kv-cache-memory-bytes: "10G"
    max-num-seqs: 128
    max-num-batched-tokens: 131072
    limit-mm-per-prompt: '{"image": 1}'
    seed: 0
  startup:
    timeout_seconds: 300
    poll_interval_seconds: 5
    stream_logs: true

# ── 평가 설정 ──
evaluate:
  model: "Qwen/Qwen3.5-0.8B"
  run_name: "Qwen3_5-08B"
  api_base: "http://127.0.0.1:8000/v1"
  bench_base_path: "/mnt/PoC_benchmark/huggingface_benchmarks_dataset/Leaderboard_bench"
  output_path: "/home/gpuadmin/Repo/seoik/train_eval_toolkit/results/vllm_eval"
  overwrite_results: false
  eval_mode: "json"
  enable_thinking: false

  benchmarks:
    - "PIA_Fire"
    - "SamsungCNT_Fire"
    - "Soil_Fire"
    - "Hyundai_Fire"
    - "Coupang_Fire"
    - "Kumho_Fire"

  # 프레임 샘플링
  window_size: 15
  interpolation: "forward"

  # 추론 파라미터
  concurrency: 100
  jpeg_quality: 95
  max_tokens: 15
  temperature: 0.0
  seed: 0
  negative_label: "normal"

  # 카테고리별 프롬프트
  # "|" = YAML 리터럴 블록 스칼라 (멀티라인 문자열, 줄바꿈 보존). 파싱 시 일반 str로 변환됨.
  prompt_templates:
    falldown: |
      Analyze this image carefully. Determine if a person has fallen down.

      Important classification rules:

      - The "falldown" category applies to any person who is lying down, regardless of:
        - the surface (e.g., floor, mattress, bed)
        - the posture (natural or unnatural)
        - the cause (e.g., sleeping, collapsing, lying intentionally)
      - This includes:
        - A person lying flat on the ground or other surfaces
        - A person collapsed or sprawled in any lying position
      - The "normal" category applies only if the person is:
        - sitting
        - standing
        - kneeling
        - or otherwise upright (not lying down)

      Answer in JSON format with BOTH of the following fields:
      - "category": either "falldown" or "normal"
      - "description": a brief reason why this classification was made (e.g., "person lying on a mattress", "person sitting on sofa")

      Example:
      {
        "category": "falldown",
        "description": "person lying on a mattress in natural posture"
      }

    fire: |
      Is there a real flame or active fire burning in this image?

      Answer "fire" if you see an actual flame or active combustion.

      Answer "normal" if the image only contains:
      - lights, headlights, sunlight, or reflections
      - fire trucks, fire extinguishers, or fire-related equipment
      - smoke without a visible flame

      Answer in JSON format:
      - "category": either "fire" or "normal"
      - "description": a brief reason

      Example:
      {
        "category": "fire",
        "description": "visible flames from burning building"
      }

    smoke: "Is {category} visible in this image? Answer only with 0 (no) or 1 (yes)."
    violence: "Is {category} visible in this image? Answer only with 0 (no) or 1 (yes)."
    sittingdown: "Is {category} visible in this image? Answer only with 0 (no) or 1 (yes)."
    smoking: "Is {category} visible in this image? Answer only with 0 (no) or 1 (yes)."
    default: "Is {category} visible in this image? Answer only with 0 (no) or 1 (yes)."

# ── 제출 설정 ──
submit:
  gradio_url: "http://172.168.47.39:7860/"
  model_name: "Qwen3_5-08B"
  task_name: "🌠 VLM 🖥️"
  datasets_used: "Pretrained"
  config_file: "config.json"
  results_base_dir: "results/vllm_eval"
  interval_seconds: 60
