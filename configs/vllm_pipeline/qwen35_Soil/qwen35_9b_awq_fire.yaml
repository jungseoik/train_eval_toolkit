# ============================================================
# vLLM 벤치마크 평가 파이프라인 설정
#
# Qwen3.5-9B AWQ (4bit) 모델의 Soil_v2 Fire 벤치마크 테스트용.
#
# 사용법:
#   python -m src.vllm_pipeline -c configs/vllm_pipeline/qwen35_Soil/qwen35_9b_awq_fire.yaml
#
# 모델 교체 시 변경 필드:
#   docker.model, evaluate.model, evaluate.run_name, submit.model_name
# ============================================================

pipeline:
  name: "Qwen3.5-9B-AWQ Fire Benchmark"
  steps:
    docker: true
    evaluate: true
    submit: true
  cleanup_docker: true
  docker_restart_interval: 1

retry:
  max_attempts: 3
  wait_seconds: 30

# ── Docker 설정 ──
docker:
  container_name: "qwen35_9b_awq_fire"
  image: "vllm/vllm-openai:cu130-nightly"
  gpus: "all"
  port: 8000
  ipc: "host"
  volumes:
    - "~/.cache/huggingface:/root/.cache/huggingface"
  model: "QuantTrio/Qwen3.5-9B-AWQ"
  vllm_args:
    tensor-parallel-size: 1
    max-model-len: 8192
    kv-cache-memory-bytes: "10G"
    max-num-seqs: 128
    max-num-batched-tokens: 131072
    limit-mm-per-prompt: '{"image": 1}'
    quantization: "awq"
    seed: 0
  startup:
    timeout_seconds: 300
    poll_interval_seconds: 5
    stream_logs: true

# ── 평가 설정 ──
evaluate:
  model: "QuantTrio/Qwen3.5-9B-AWQ"
  run_name: "Qwen3_5-9B-AWQ"
  api_base: "http://127.0.0.1:8000/v1"
  bench_base_path: "/mnt/PoC_benchmark/huggingface_benchmarks_dataset/Leaderboard_bench"
  output_path: "/home/gpuadmin/Repo/seoik/train_eval_toolkit/results/vllm_eval"
  overwrite_results: false
  eval_mode: "cls"
  enable_thinking: false

  benchmarks:
    - "Soil_v2_Fire"

  # 프레임 샘플링
  window_size: 15
  interpolation: "forward"

  # 추론 파라미터
  concurrency: 100
  jpeg_quality: 95
  max_tokens: 1              # cls 모드: yes/no 단일 토큰
  temperature: 0.0
  seed: 0
  negative_label: "normal"

  # 카테고리별 프롬프트
  prompt_templates:
    fire: |
      Is there a real flame or active fire burning in this image?

      Answer "yes" if you see an actual flame or active combustion.

      Answer "no" if the image only contains:
      - lights, headlights, sunlight, or reflections
      - fire trucks, fire extinguishers, or fire-related equipment
      - smoke without a visible flame

      Answer only: "yes" or "no"
    default: "Is {category} visible in this image? Answer only with yes or no."

# ── 제출 설정 ──
submit:
  gradio_url: "http://172.168.47.39:7860/"
  model_name: "Qwen3_5-9B-AWQ"
  task_name: "🌠 VLM 🖥️"
  datasets_used: "Pretrained"
  config_file: "config.json"
  results_base_dir: "results/vllm_eval"
  interval_seconds: 60
