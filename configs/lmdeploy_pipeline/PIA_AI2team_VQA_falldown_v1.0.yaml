# ============================================================
# LMDeploy 벤치마크 평가 파이프라인 설정 - Falldown (CLS 모드)
#
# PIA_AI2team_VQA_falldown_v1.0 모델의 벤치마크 테스트용.
# 이 모델은 <CLS_FALLDOWN> 특수 토큰으로 yes/no 분류 응답을 반환.
#
# 사용법:
#   python -m src.lmdeploy_pipeline -c configs/lmdeploy_pipeline/PIA_AI2team_VQA_falldown_v1.0.yaml
#
# 모델 교체 시 변경 필드:
#   docker.model_path, docker.hf_repo_id, evaluate.run_name, submit.model_name
# ============================================================

pipeline:
  name: "PIA_AI2team_VQA_falldown_v1.0 Benchmark (LMDeploy)"
  steps:
    docker: true
    evaluate: true
    submit: true
  cleanup_docker: true
  docker_restart_interval: 1

retry:
  max_attempts: 3
  wait_seconds: 30

# -- Docker 설정 --
docker:
  container_name: "pia_ai2team_vqa_falldown_v1_0_lmdeploy"
  image: "openmmlab/lmdeploy:latest-cu12"
  model_path: "ckpts/PIA_AI2team_VQA_falldown_v1.0"
  hf_repo_id: "PIA-SPACE-LAB/PIA_AI2team_VQA_falldown_v1.0"
  container_model_path: "/model"
  gpus: "all"
  port: 23333
  ipc: "host"
  volumes: []
  lmdeploy_args:
    tp: 1
    session-len: 8192
    backend: "pytorch"
    cache-max-entry-count: 0.1
    max-concurrent-requests: 256
  startup:
    timeout_seconds: 300
    poll_interval_seconds: 5
    stream_logs: true

# -- 평가 설정 --
evaluate:
  model: "/model"
  run_name: "PIA_AI2team_VQA_falldown_v1.0"
  api_base: "http://127.0.0.1:23333/v1"
  bench_base_path: "/mnt/PoC_benchmark/huggingface_benchmarks_dataset/Leaderboard_bench"
  output_path: "results/lmdeploy_eval"
  overwrite_results: false
  eval_mode: "cls"                     # CLS 토큰 분류 모드 (yes/no 응답)

  benchmarks:
    - "ABB_Falldown"
    - "Coupang_Falldown"
    - "DTRO_Falldown"
    - "GangNam_Falldown"
    - "Hyundai_Falldown"
    - "Innodep_Falldown"
    - "KhonKaen_Falldown"
    - "KISA_Falldown"
    - "Kumho_Falldown"
    - "PIA_Falldown"
    - "Soil_Falldown"
    - "UGO_Falldown"
    - "Yonsei_Falldown"

  # 프레임 샘플링
  window_size: 30
  interpolation: "forward"

  # 추론 파라미터
  concurrency: 100
  jpeg_quality: 95
  max_tokens: 1                        # yes/no 단일 토큰 응답
  temperature: 0.0
  seed: 0
  negative_label: "normal"

  # CLS 모드 프롬프트: 특수 토큰만 전달
  prompt_templates:
    falldown: "<CLS_FALLDOWN>"
    default: "<CLS_FALLDOWN>"

# -- 제출 설정 --
submit:
  gradio_url: "http://172.168.47.39:7860/"
  model_name: "PIA_AI2team_VQA_falldown_v1.0"
  task_name: "🌠 VLM 🖥️"
  datasets_used: "Finetuned"
  config_file: "config.json"
  results_base_dir: "results/lmdeploy_eval"
  interval_seconds: 60
