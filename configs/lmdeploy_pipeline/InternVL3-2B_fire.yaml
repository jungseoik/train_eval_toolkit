# ============================================================
# LMDeploy 벤치마크 평가 파이프라인 설정 - Fire
#
# InternVL3-2B 베이스 모델의 Fire 벤치마크 테스트용.
# (테스트셋 평가 Precision/Recall/F1 과는 별개 프로세스)
#
# 사용법:
#   python -m src.lmdeploy_pipeline -c configs/lmdeploy_pipeline/InternVL3-2B_fire.yaml
#
# 모델 교체 시 변경 필드:
#   docker.model_path, docker.hf_repo_id, evaluate.run_name, submit.model_name
# ============================================================

pipeline:
  name: "InternVL3-2B Fire Benchmark (LMDeploy)"
  steps:
    docker: true
    evaluate: true
    submit: true
  cleanup_docker: true
  docker_restart_interval: 1   # 벤치마크 N개마다 Docker 재시작 (0=비활성, 기본값 1)

retry:
  max_attempts: 3
  wait_seconds: 30

# -- Docker 설정 --
docker:
  container_name: "internvl3_2b_lmdeploy"
  image: "openmmlab/lmdeploy:latest-cu12"
  model_path: "ckpts/InternVL3-2B"     # 베이스 모델 경로
  # hf_repo_id: "OpenGVLab/InternVL3-2B"  # (선택) model_path에 모델이 없으면 HF에서 자동 다운로드
  container_model_path: "/model"
  gpus: "all"
  port: 23333
  ipc: "host"
  volumes: []
  lmdeploy_args:
    tp: 1
    session-len: 8192
    backend: "pytorch"
    cache-max-entry-count: 0.8   # KV cache GPU 메모리 비율 (0.0~1.0, 기본 0.8)
  startup:
    timeout_seconds: 300
    poll_interval_seconds: 5
    stream_logs: true

# -- 평가 설정 --
evaluate:
  model: "/model"
  run_name: "InternVL3-2B"
  api_base: "http://127.0.0.1:23333/v1"
  bench_base_path: "/mnt/PoC_benchmark/huggingface_benchmarks_dataset/Leaderboard_bench"
  output_path: "results/lmdeploy_eval"
  overwrite_results: false

  benchmarks:
    - "PIA_Fire"
    - "SamsungCNT_Fire"
    - "Soil_Fire"
    - "Hyundai_Fire"
    - "Coupang_Fire"
    - "Kumho_Fire"

  # 프레임 샘플링
  window_size: 15
  interpolation: "forward"

  # 추론 파라미터
  concurrency: 10
  jpeg_quality: 95
  max_tokens: 15
  temperature: 0.0
  seed: 0
  negative_label: "normal"

  # 카테고리별 프롬프트
  prompt_templates:
    fire: |
      Analyze this image carefully. Only classify it as "fire" if there are ACTUAL FLAMES or ACTIVE FIRE visible in the image.

      Important classification rules:
      - "fire" category: ONLY if there are visible flames, burning fire, or active combustion
      - Fire-related objects WITHOUT actual flames (like fire trucks, fire extinguishers, fire hydrants) are "normal"
      - Red colors, sunset glows, red lights, or the sun are NOT fire
      - Fire emojis or cartoons of fire are NOT real fire

      Answer in JSON format with BOTH of the following fields:
      - "category": either "fire" or "normal"
      - "description": a brief reason why this classification was made (e.g., "visible flames from campfire", "fire truck without flames")

      Example:
      {
        "category": "fire",
        "description": "visible flames from burning building"
      }

    default: "Is {category} visible in this image? Answer only with 0 (no) or 1 (yes)."

# -- 제출 설정 --
submit:
  gradio_url: "http://172.168.47.39:7860/"
  model_name: "InternVL3-2B"
  task_name: "🌠 VLM 🖥️"
  datasets_used: "Finetuned"
  config_file: "config.json"
  results_base_dir: "results/lmdeploy_eval"
  interval_seconds: 60
