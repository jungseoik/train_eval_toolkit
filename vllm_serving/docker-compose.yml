services:
  vllm-server:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    container_name: vllm-server
    ipc: host
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - KV_CACHE_MEMORY_BYTES=${KV_CACHE_MEMORY_BYTES:-}
      - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # 주의: docker compose는 $$ 로 리터럴 $를 이스케이프한다.
    # KV_CACHE_MEMORY_BYTES가 설정되어 있으면 --kv-cache-memory-bytes 인자를 추가한다.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        KV_CACHE_ARG=""
        if [ -n "$${KV_CACHE_MEMORY_BYTES}" ]; then
          KV_CACHE_ARG="--kv-cache-memory-bytes $${KV_CACHE_MEMORY_BYTES}"
        fi
        exec python -m vllm.entrypoints.openai.api_server \
          --model ${MODEL_NAME:-Qwen/Qwen2.5-VL-7B-Instruct} \
          --tensor-parallel-size ${TENSOR_PARALLEL_SIZE:-1} \
          --max-model-len ${MAX_MODEL_LEN:-8192} \
          --max-num-seqs ${MAX_NUM_SEQS:-128} \
          --max-num-batched-tokens ${MAX_NUM_BATCHED_TOKENS:-131072} \
          --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION:-0.9} \
          --limit-mm-per-prompt '{"image": 1}' \
          --seed 0 \
          $$KV_CACHE_ARG \
          ${EXTRA_VLLM_ARGS}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
